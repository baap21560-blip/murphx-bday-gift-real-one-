<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShowVerse | Discovery Hub</title>
    <style>
        :root {
            --primary: #e50914;
            --bg: #0f0f0f;
            --card-bg: #1c1c1c;
            --text: #ffffff;
            --accent: #ff1e1e;
            --modal-bg: #181818;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }

        /* --- Header & Search --- */
        header {
            background: rgba(20, 20, 20, 0.95);
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #333;
        }

        header h1 {
            color: var(--primary);
            margin: 0;
            letter-spacing: 1px;
            font-size: 1.8rem;
        }

        .search-container {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        header input {
            padding: 10px 15px;
            border-radius: 20px;
            border: 1px solid #444;
            background: #2b2b2b;
            color: white;
            width: 250px;
            transition: 0.3s;
        }

        header input:focus {
            outline: none;
            border-color: var(--primary);
            width: 300px;
        }

        /* --- Layout --- */
        section { padding: 2rem 5%; }
        h2 { border-left: 4px solid var(--primary); padding-left: 15px; margin-bottom: 1.5rem; }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 20px;
        }

        /* --- Cards --- */
        .card {
            background: var(--card-bg);
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .card:hover { transform: translateY(-8px); }

        .card img {
            width: 100%;
            aspect-ratio: 2/3;
            object-fit: cover;
            display: block;
        }

        .card h3 {
            padding: 12px;
            font-size: 0.9rem;
            margin: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* --- Professional Modal Redesign --- */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            padding: 20px;
        }

        .modal-box {
            background: var(--modal-bg);
            max-width: 800px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            border-radius: 12px;
            position: relative;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        /* Close Button Overlay */
        .close-circle {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 40px;
            height: 40px;
            background: rgba(0,0,0,0.7);
            color: white;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            z-index: 10;
            font-size: 24px;
            transition: 0.2s;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .close-circle:hover { background: var(--primary); }

        .modal-banner {
            width: 100%;
            height: 400px;
            object-fit: cover;
            mask-image: linear-gradient(to bottom, black 70%, transparent 100%);
        }

        .modal-body { 
            padding: 0 40px 40px 40px;
            margin-top: -60px;
            position: relative;
        }

        .modal-body h2 { 
            font-size: 2.5rem; 
            margin-bottom: 10px;
            border: none;
            padding: 0;
        }

        .description {
            color: #cccccc;
            font-size: 1.1rem;
            max-width: 90%;
            margin-bottom: 30px;
        }

        /* --- Buttons --- */
        .btn-group { display: flex; flex-wrap: wrap; gap: 12px; }
        
        button {
            padding: 12px 24px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            transition: 0.2s;
            background: #333;
            color: white;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        button.primary { background: white; color: black; }
        button.primary:hover { background: #e6e6e6; }

        button.back-btn { background: rgba(255,255,255,0.1); border: 1px solid #444; }
        button.back-btn:hover { background: rgba(255,255,255,0.2); }

        .loader { text-align: center; padding: 50px; color: #666; font-style: italic; }
    </style>
</head>
<body>

<header>
    <h1>ShowVerse</h1>
    <div class="search-container">
        <button onclick="surpriseMe()" style="background:transparent; font-size: 1.5rem; min-width: auto; padding: 0;">🎲</button>
        <input id="search" type="text" placeholder="Search shows...">
    </div>
</header>

<section id="watchlistSection" style="display: none;">
    <h2>⭐ My Watchlist</h2>
    <div id="watchlistGrid" class="grid"></div>
</section>

<section>
    <h2>🔥 Top Anime</h2>
    <div id="animeGrid" class="grid"><div class="loader">Loading...</div></div>
</section>

<section>
    <h2>📺 TV Shows</h2>
    <div id="tvGrid" class="grid"><div class="loader">Loading...</div></div>
</section>

<div id="modal" class="modal" onclick="if(event.target === this) closeModal()">
    <div class="modal-box">
        <div class="close-circle" onclick="closeModal()">✕</div>
        <div id="modalContent"></div>
    </div>
</div>

<script>
const animeGrid = document.getElementById("animeGrid");
const tvGrid = document.getElementById("tvGrid");
const modal = document.getElementById("modal");
const modalContent = document.getElementById("modalContent");
const searchInput = document.getElementById("search");

let watchlist = JSON.parse(localStorage.getItem('showVerse_watchlist')) || [];
let currentDataPool = [];

const cleanHTML = (str) => str ? str.replace(/<\/?[^>]+(>|$)/g, "") : "No description available.";

async function fetchData(url) {
    try {
        const res = await fetch(url);
        return await res.json();
    } catch (err) { return null; }
}

async function init() {
    renderWatchlist();
    const animeData = await fetchData("https://api.jikan.moe/v4/top/anime");
    if(animeData) {
        renderItems(animeData.data.slice(0, 12), animeGrid, 'anime');
        animeData.data.forEach(item => currentDataPool.push({title: item.title, img: item.images.jpg.large_image_url, desc: item.synopsis}));
    }
    const tvData = await fetchData("https://api.tvmaze.com/shows");
    if(tvData) {
        renderItems(tvData.slice(0, 12), tvGrid, 'tv');
        tvData.slice(0, 12).forEach(item => currentDataPool.push({title: item.name, img: item.image?.original, desc: item.summary}));
    }
}

function renderItems(list, container, type) {
    container.innerHTML = "";
    list.forEach(item => {
        const title = type === 'anime' ? item.title : item.name;
        const img = type === 'anime' ? item.images.jpg.image_url : (item.image?.medium || '');
        const largeImg = type === 'anime' ? item.images.jpg.large_image_url : (item.image?.original || img);
        const desc = type === 'anime' ? item.synopsis : item.summary;

        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `<img src="${img}"><h3>${title}</h3>`;
        card.onclick = () => openModal(title, largeImg, desc);
        container.appendChild(card);
    });
}

function openModal(title, image, description) {
    modal.style.display = "flex";
    document.body.style.overflow = "hidden";
    
    const isInWatchlist = watchlist.some(i => i.title === title);

    modalContent.innerHTML = `
        <img src="${image}" class="modal-banner">
        <div class="modal-body">
            <h2>${title}</h2>
            <p class="description">${cleanHTML(description)}</p>
            <div class="btn-group">
                <button class="primary" onclick="searchPlatform('${title}', 'netflix')">▶ Play on Netflix</button>
                <button onclick="toggleWatchlist('${title}', '${image}', \`${description}\`)">
                    ${isInWatchlist ? 'Checkmark ✓ Saved' : '+ My List'}
                </button>
                <button class="back-btn" onclick="closeModal()">← Back</button>
            </div>
            <div style="margin-top: 20px; display: flex; gap: 10px; opacity: 0.7;">
                <span style="cursor:pointer" onclick="searchPlatform('${title}', 'prime')">Prime Video</span> • 
                <span style="cursor:pointer" onclick="searchPlatform('${title}', 'crunchyroll')">Crunchyroll</span>
            </div>
        </div>
    `;
}

function toggleWatchlist(title, image, description) {
    const index = watchlist.findIndex(i => i.title === title);
    if (index > -1) {
        watchlist.splice(index, 1);
    } else {
        watchlist.push({ title, img: image, desc: description });
    }
    localStorage.setItem('showVerse_watchlist', JSON.stringify(watchlist));
    renderWatchlist();
    openModal(title, image, description);
}

function renderWatchlist() {
    const grid = document.getElementById("watchlistGrid");
    const section = document.getElementById("watchlistSection");
    if (watchlist.length === 0) { section.style.display = "none"; return; }
    section.style.display = "block";
    grid.innerHTML = "";
    watchlist.forEach(item => {
        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `<img src="${item.img}"><h3>${item.title}</h3>`;
        card.onclick = () => openModal(item.title, item.img, item.desc);
        grid.appendChild(card);
    });
}

function closeModal() {
    modal.style.display = "none";
    document.body.style.overflow = "auto";
}

function searchPlatform(title, platform) {
    const urls = {
        netflix: `https://www.netflix.com/search?q=${title}`,
        prime: `https://www.primevideo.com/search?phrase=${title}`,
        crunchyroll: `https://www.crunchyroll.com/search?q=${title}`
    };
    window.open(urls[platform], "_blank");
}

function surpriseMe() {
    const item = currentDataPool[Math.floor(Math.random() * currentDataPool.length)];
    openModal(item.title, item.img, item.desc);
}

searchInput.addEventListener("keypress", async (e) => {
    if (e.key === "Enter") {
        const q = searchInput.value;
        const [a, t] = await Promise.all([
            fetchData(`https://api.jikan.moe/v4/anime?q=${q}`),
            fetchData(`https://api.tvmaze.com/search/shows?q=${q}`)
        ]);
        if(a) renderItems(a.data.slice(0, 12), animeGrid, 'anime');
        if(t) renderItems(t.map(i => i.show).slice(0, 12), tvGrid, 'tv');
    }
});

init();
</script>
</body>
</html>
