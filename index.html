<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShowVerse | Discovery Hub</title>
    <style>
        :root {
            --primary: #e50914;
            --bg: #0f0f0f;
            --card-bg: #1c1c1c;
            --text: #ffffff;
            --accent: #ff1e1e;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }

        /* --- Header & Search --- */
        header {
            background: rgba(20, 20, 20, 0.95);
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #333;
        }

        header h1 {
            color: var(--primary);
            margin: 0;
            letter-spacing: 1px;
            font-size: 1.8rem;
        }

        .search-container {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        header input {
            padding: 10px 15px;
            border-radius: 20px;
            border: 1px solid #444;
            background: #2b2b2b;
            color: white;
            width: 250px;
            transition: 0.3s;
        }

        header input:focus {
            outline: none;
            border-color: var(--primary);
            width: 300px;
            box-shadow: 0 0 10px rgba(229, 9, 20, 0.3);
        }

        /* --- Layout --- */
        section { padding: 2rem 5%; }
        h2 { border-left: 4px solid var(--primary); padding-left: 15px; margin-bottom: 1.5rem; }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 20px;
        }

        /* --- Cards --- */
        .card {
            background: var(--card-bg);
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            position: relative;
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        .card img {
            width: 100%;
            aspect-ratio: 2/3;
            object-fit: cover;
            display: block;
        }

        .card h3 {
            padding: 12px;
            font-size: 0.9rem;
            margin: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* --- Modal --- */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
        }

        .modal-box {
            background: var(--card-bg);
            max-width: 600px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            border-radius: 12px;
            position: relative;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }

        .modal-body { padding: 25px; }

        .modal-box img {
            width: 100%;
            height: 300px;
            object-fit: cover;
        }

        /* High Visibility Close Button */
        .close {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 35px;
            height: 35px;
            background: rgba(0,0,0,0.7);
            color: white;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            z-index: 10;
            font-size: 20px;
            font-weight: bold;
            border: 1px solid rgba(255,255,255,0.3);
        }

        /* --- Buttons --- */
        .btn-group { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 20px; }
        
        button {
            flex: 1;
            min-width: 140px;
            padding: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
            background: #333;
            color: white;
        }

        button.primary { background: var(--primary); }
        button.random-btn { background: #555; border-radius: 20px; width: auto; flex: none; min-width: 50px;}
        button.back-btn { background: #444; }
        button:hover { opacity: 0.8; transform: translateY(-2px); }

        /* Loading Spinner */
        .loader { text-align: center; padding: 50px; color: #666; font-style: italic; }
    </style>
</head>
<body>

<header>
    <h1>ShowVerse</h1>
    <div class="search-container">
        <button class="random-btn" onclick="surpriseMe()" title="Surprise Me! 🎲">🎲</button>
        <input id="search" type="text" placeholder="Press Enter to search...">
    </div>
</header>

<section id="watchlistSection" style="display: none;">
    <h2>⭐ My Watchlist</h2>
    <div id="watchlistGrid" class="grid"></div>
</section>

<section>
    <h2>🔥 Top Anime</h2>
    <div id="animeGrid" class="grid"><div class="loader">Loading favorites...</div></div>
</section>

<section>
    <h2>📺 TV Shows</h2>
    <div id="tvGrid" class="grid"><div class="loader">Loading shows...</div></div>
</section>

<div id="modal" class="modal" onclick="if(event.target === this) closeModal()">
    <div class="modal-box">
        <span class="close" onclick="closeModal()">✕</span>
        <div id="modalContent"></div>
    </div>
</div>

<script>
const animeGrid = document.getElementById("animeGrid");
const tvGrid = document.getElementById("tvGrid");
const modal = document.getElementById("modal");
const modalContent = document.getElementById("modalContent");
const searchInput = document.getElementById("search");

// Watchlist State
let watchlist = JSON.parse(localStorage.getItem('showVerse_watchlist')) || [];
let currentDataPool = []; // To store loaded data for the randomizer

// Helper: Sanitize HTML (TVMaze summary contains tags)
const cleanHTML = (str) => str ? str.replace(/<\/?[^>]+(>|$)/g, "") : "No description available.";

// API Logic
async function fetchData(url) {
    try {
        const res = await fetch(url);
        if (!res.ok) throw new Error("Network error");
        return await res.json();
    } catch (err) {
        console.error(err);
        return null;
    }
}

async function init() {
    renderWatchlist();
    
    const animeData = await fetchData("https://api.jikan.moe/v4/top/anime");
    if(animeData) {
        renderItems(animeData.data.slice(0, 12), animeGrid, 'anime');
        // Pool for randomizer
        animeData.data.forEach(item => currentDataPool.push({
            title: item.title, 
            img: item.images.jpg.image_url, 
            desc: item.synopsis
        }));
    }

    const tvData = await fetchData("https://api.tvmaze.com/shows");
    if(tvData) {
        renderItems(tvData.slice(0, 12), tvGrid, 'tv');
        // Pool for randomizer
        tvData.slice(0, 12).forEach(item => currentDataPool.push({
            title: item.name, 
            img: item.image?.medium, 
            desc: item.summary
        }));
    }
}

function renderItems(list, container, type) {
    container.innerHTML = "";
    if (list.length === 0) {
        container.innerHTML = "<p>No results found.</p>";
        return;
    }

    list.forEach(item => {
        const title = type === 'anime' ? item.title : item.name;
        const img = type === 'anime' ? item.images.jpg.image_url : (item.image?.medium || 'https://via.placeholder.com/210x295?text=No+Image');
        const desc = type === 'anime' ? item.synopsis : item.summary;

        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `
            <img src="${img}" alt="${title}" loading="lazy">
            <h3>${title}</h3>
        `;
        card.onclick = () => openModal(title, img, desc);
        container.appendChild(card);
    });
}

// Watchlist Logic
function saveWatchlist() {
    localStorage.setItem('showVerse_watchlist', JSON.stringify(watchlist));
    renderWatchlist();
}

function renderWatchlist() {
    const watchlistGrid = document.getElementById("watchlistGrid");
    const section = document.getElementById("watchlistSection");

    if (watchlist.length === 0) {
        section.style.display = "none";
        return;
    }

    section.style.display = "block";
    watchlistGrid.innerHTML = "";
    
    watchlist.forEach(item => {
        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `
            <img src="${item.img}" alt="${item.title}">
            <h3>${item.title}</h3>
        `;
        card.onclick = () => openModal(item.title, item.img, item.desc);
        watchlistGrid.appendChild(card);
    });
}

function openModal(title, image, description) {
    modal.style.display = "flex";
    document.body.style.overflow = "hidden";
    
    const isInWatchlist = watchlist.some(i => i.title === title);
    const watchBtnText = isInWatchlist ? "Remove from Watchlist" : "⭐ Add to Watchlist";

    modalContent.innerHTML = `
        <img src="${image}">
        <div class="modal-body">
            <h2>${title}</h2>
            <p>${cleanHTML(description)}</p>
            <div class="btn-group">
                <button class="${isInWatchlist ? '' : 'primary'}" id="watchBtn">${watchBtnText}</button>
                <button class="back-btn" onclick="closeModal()">← Back</button>
                <div style="width:100%; height:1px; background:#444; margin: 5px 0;"></div>
                <button onclick="searchPlatform('${title}', 'netflix')">Netflix</button>
                <button onclick="searchPlatform('${title}', 'prime')">Prime Video</button>
                <button onclick="searchPlatform('${title}', 'crunchyroll')">Crunchyroll</button>
                <button onclick="searchPlatform('${title}', 'youtube')">YouTube</button>
                <button onclick="searchPlatform('${title}', 'google')">Google Search</button>
            </div>
        </div>
    `;

    document.getElementById('watchBtn').onclick = () => {
        if (isInWatchlist) {
            watchlist = watchlist.filter(i => i.title !== title);
        } else {
            watchlist.push({ title, img: image, desc: description });
        }
        saveWatchlist();
        openModal(title, image, description); // Refresh modal view
    };
}

function closeModal() {
    modal.style.display = "none";
    document.body.style.overflow = "auto";
}

function searchPlatform(title, platform) {
    const queries = {
        netflix: `https://www.netflix.com/search?q=${title}`,
        prime: `https://www.primevideo.com/search?phrase=${title}`,
        crunchyroll: `https://www.crunchyroll.com/search?q=${title}`,
        youtube: `https://www.youtube.com/results?search_query=${title}+full+episodes`,
        google: `https://www.google.com/search?q=watch+${title}+online`
    };
    window.open(queries[platform], "_blank");
}

// Randomizer Feature
function surpriseMe() {
    if (currentDataPool.length === 0) return;
    const randomItem = currentDataPool[Math.floor(Math.random() * currentDataPool.length)];
    openModal(randomItem.title, randomItem.img, randomItem.desc);
}

// Search Feature
searchInput.addEventListener("keypress", async (e) => {
    if (e.key === "Enter") {
        const q = searchInput.value.trim();
        if(!q) return;

        animeGrid.innerHTML = '<div class="loader">Searching Anime...</div>';
        tvGrid.innerHTML = '<div class="loader">Searching TV...</div>';

        const [animeRes, tvRes] = await Promise.all([
            fetchData(`https://api.jikan.moe/v4/anime?q=${q}`),
            fetchData(`https://api.tvmaze.com/search/shows?q=${q}`)
        ]);

        if(animeRes) {
            renderItems(animeRes.data.slice(0, 12), animeGrid, 'anime');
            // Update pool for randomizer with search results
            currentDataPool = animeRes.data.map(i => ({title: i.title, img: i.images.jpg.image_url, desc: i.synopsis}));
        }
        if(tvRes) {
            renderItems(tvRes.map(i => i.show).slice(0, 12), tvGrid, 'tv');
            tvRes.forEach(i => currentDataPool.push({title: i.show.name, img: i.show.image?.medium, desc: i.show.summary}));
        }
    }
});

init();
</script>
</body>
</html>
