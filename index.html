<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Murphx | Discovery Hub</title>
    <style>
        :root {
            --primary: #e50914;
            --primary-hover: #ff1f1f;
            --bg: #050505;
            --card-bg: rgba(255, 255, 255, 0.03);
            --glass: rgba(10, 10, 10, 0.8);
            --text: #ffffff;
            --transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1); /* Smoother curve */
        }

        * { box-sizing: border-box; }
        html { scroll-behavior: smooth; }

        body {
            margin: 0;
            font-family: 'Inter', 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* --- New Animation Layer --- */
        
        /* 1. Shimmer effect for loading */
        @keyframes shimmer {
            0% { background-position: -468px 0; }
            100% { background-position: 468px 0; }
        }

        /* 2. Entrance Animations */
        @keyframes slideUpFade {
            from { opacity: 0; transform: translateY(40px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        @keyframes scaleIn {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        /* Applied classes */
        .animate-item { 
            animation: slideUpFade 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0; 
        }

        /* Smooth Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; transition: 0.3s; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary); }

        /* --- Header Enhancements --- */
        header {
            background: var(--glass);
            padding: 1.2rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            transition: var(--transition);
        }

        .nav-left h1 {
            color: var(--primary);
            margin: 0;
            font-size: 1.8rem;
            letter-spacing: 2px;
            font-weight: 900;
            cursor: pointer;
            transition: var(--transition);
            text-shadow: 0 0 15px rgba(229, 9, 20, 0.3);
        }

        .nav-left h1:hover { transform: scale(1.05); filter: brightness(1.2); }

        nav { display: flex; gap: 25px; margin-top: 5px; }
        nav a {
            color: #aaa;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
            transition: var(--transition);
            position: relative;
        }
        nav a:hover { color: #fff; transform: translateY(-2px); }
        nav a::after {
            content: '';
            position: absolute;
            bottom: -5px; left: 50%;
            width: 0; height: 2px;
            background: var(--primary);
            transition: var(--transition);
            transform: translateX(-50%);
        }
        nav a:hover::after { width: 100%; }

        .search-container input {
            padding: 12px 20px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.05);
            color: white;
            width: 240px;
            transition: var(--transition);
        }
        .search-container input:focus {
            width: 320px;
            outline: none;
            background: rgba(255, 255, 255, 0.12);
            border-color: var(--primary);
            box-shadow: 0 0 25px rgba(229, 9, 20, 0.4);
        }

        /* --- Hero Section Enhancements --- */
        .hero {
            height: 90vh;
            width: 100%;
            position: relative;
            display: flex;
            align-items: center;
            padding: 0 5%;
            overflow: hidden;
            perspective: 1000px;
        }

        #heroBg {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center 20%;
            transition: transform 2s ease, opacity 1s ease-in-out;
            z-index: -1;
            filter: brightness(0.5) saturate(1.2);
            transform: scale(1.1);
        }

        /* Hero Ken Burns Effect */
        .hero-active #heroBg { transform: scale(1); }

        .hero::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to right, #050505 20%, transparent 70%),
                        linear-gradient(to top, #050505 10%, transparent 40%);
        }

        .hero-content {
            max-width: 700px;
            z-index: 2;
            opacity: 0;
            transform: translateX(-50px);
            transition: all 1s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .hero-content.active { opacity: 1; transform: translateX(0); }

        .hero-content h2 { 
            font-size: 4.5rem; 
            margin: 10px 0; 
            font-weight: 800; 
            line-height: 1; 
            letter-spacing: -2px;
            text-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* --- Cards & Grid Enhancements --- */
        section { 
            padding: 5rem 5% 2rem; 
            opacity: 0; 
            transform: translateY(30px); 
            transition: opacity 1s ease, transform 1s ease; 
        }
        section.visible { opacity: 1; transform: translateY(0); }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 30px;
            margin-top: 30px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 16px;
            overflow: hidden;
            position: relative;
            transition: var(--transition);
            border: 1px solid rgba(255, 255, 255, 0.05);
            cursor: pointer;
            transform-style: preserve-3d;
        }

        .card:hover {
            transform: translateY(-15px) scale(1.03);
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            z-index: 10;
        }

        .card img {
            width: 100%;
            aspect-ratio: 2/3;
            object-fit: cover;
            transition: transform 0.8s ease;
        }

        .card:hover img { transform: scale(1.15); filter: brightness(0.8); }

        .card-info {
            padding: 20px 15px;
            background: linear-gradient(to top, rgba(0,0,0,0.95) 20%, transparent);
            position: absolute;
            bottom: 0; width: 100%;
            transform: translateY(10px);
            transition: var(--transition);
        }
        .card:hover .card-info { transform: translateY(0); }
        .card-info h3 { margin: 0; font-size: 1rem; font-weight: 600; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }

        /* --- Modal Enhancements --- */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            opacity: 0;
            transition: opacity 0.4s ease;
            backdrop-filter: blur(15px);
        }

        .modal.open { display: flex; opacity: 1; }

        .modal-box {
            background: #0a0a0a;
            width: 95%;
            max-width: 1100px;
            border-radius: 30px;
            overflow: hidden;
            transform: scale(0.8) translateY(50px);
            transition: 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 50px 100px rgba(0,0,0,0.8);
        }

        .modal.open .modal-box { transform: scale(1) translateY(0); }

        .modal-banner {
            height: 500px;
            width: 100%;
            background-size: cover;
            background-position: center 20%;
            position: relative;
        }

        .modal-banner::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, #0a0a0a 10%, transparent);
        }

        /* --- Buttons Enhancements --- */
        button {
            padding: 14px 32px;
            border-radius: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
            border: none;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1rem;
            position: relative;
            overflow: hidden;
        }

        button.primary { background: var(--primary); color: white; box-shadow: 0 10px 20px rgba(229, 9, 20, 0.2); }
        button.primary:hover { 
            background: var(--primary-hover); 
            transform: scale(1.05) translateY(-3px); 
            box-shadow: 0 15px 30px rgba(229, 9, 20, 0.4);
        }
        button.primary:active { transform: scale(0.98); }

        button.secondary { background: rgba(255,255,255,0.08); color: white; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        button.secondary:hover { background: rgba(255,255,255,0.15); transform: translateY(-3px); }

        @media (max-width: 768px) {
            .hero-content h2 { font-size: 2.8rem; }
            .grid { grid-template-columns: repeat(2, 1fr); gap: 15px; }
            header { padding: 1rem 15px; }
            .search-container input { width: 140px; }
            .modal-banner { height: 300px; }
        }
    </style>
</head>
<body class="hero-active">

<header id="mainNav">
    <div class="nav-left">
        <h1 onclick="window.scrollTo(0,0)">MURPHX</h1>
        <nav>
            <a href="#">Home</a>
            <a href="#animeSection">Anime</a>
            <a href="#tvSection">TV Shows</a>
        </nav>
    </div>
    <div class="search-container" style="display:flex; gap:10px;">
        <input id="search" type="text" placeholder="Search titles...">
        <button onclick="surpriseMe()" class="secondary" style="padding:10px; border-radius: 50%;">🎲</button>
    </div>
</header>

<div class="hero">
    <div id="heroBg"></div>
    <div class="hero-content" id="heroContent">
        <span style="color:var(--primary); font-weight:bold; letter-spacing: 4px; font-size: 0.75rem; display:block; margin-bottom:10px;">TRENDING NOW</span>
        <h2 id="heroTitle">Connecting...</h2>
        <p id="heroDesc" style="color: #bbb; font-size: 1.15rem; margin-bottom: 35px; max-width: 90%;"></p>
        <div class="btn-group" style="display:flex; gap:15px;">
            <button class="primary" id="heroBtn">View Details</button>
            <button class="secondary" onclick="surpriseMe()">Surprise Me</button>
        </div>
    </div>
</div>

<section id="watchlistSection" style="display: none;">
    <h2>⭐ My Watchlist</h2>
    <div id="watchlistGrid" class="grid"></div>
</section>

<section id="animeSection">
    <div class="section-header"><h2>Top Anime</h2></div>
    <div id="animeGrid" class="grid"></div>
    <div style="text-align:center; margin-top:50px;">
        <button class="secondary" style="margin:auto" onclick="loadMore('anime')">Explore More Anime</button>
    </div>
</section>

<section id="tvSection">
    <div class="section-header"><h2>TV Shows</h2></div>
    <div id="tvGrid" class="grid"></div>
</section>

<div id="modal" class="modal" onclick="if(event.target === this) closeModal()">
    <div class="modal-box">
        <div id="modalBanner" class="modal-banner"></div>
        <div style="padding: 50px; position: relative; margin-top: -120px; z-index: 5;">
            <h2 id="modalTitle" style="font-size: 3.5rem; margin: 0; border: none; letter-spacing: -2px;"></h2>
            <p id="modalDesc" style="color: #aaa; margin: 25px 0; max-height: 180px; overflow-y: auto; font-size: 1.1rem; line-height: 1.8;"></p>
            <div class="btn-group" id="modalButtons" style="display:flex; flex-wrap:wrap; gap:15px;"></div>
        </div>
        <button onclick="closeModal()" style="position:absolute; top:25px; right:25px; background:rgba(0,0,0,0.5); border-radius:50%; width:45px; height:45px; justify-content:center; backdrop-filter: blur(10px);">✕</button>
    </div>
</div>

<script>
let watchlist = JSON.parse(localStorage.getItem('murphx_watchlist')) || [];
let currentDataPool = [];
let pageAnime = 1;

// Intersection Observer for Scroll Animations
const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
        if(entry.isIntersecting) {
            entry.target.classList.add('visible');
            // Trigger staggered animation for children cards
            const cards = entry.target.querySelectorAll('.animate-item');
            cards.forEach((card, i) => {
                setTimeout(() => card.style.opacity = "1", i * 100);
            });
        }
    });
}, { threshold: 0.1 });

const cleanHTML = (str) => str ? str.replace(/<\/?[^>]+(>|$)/g, "") : "No description available.";

async function fetchData(url) {
    try { const res = await fetch(url); return await res.json(); } 
    catch (err) { return null; }
}

async function init() {
    document.querySelectorAll('section').forEach(s => observer.observe(s));
    renderWatchlist();
    await Promise.all([loadMore('anime'), loadMore('tv')]);
    updateHero(0);
}

async function loadMore(type) {
    if(type === 'anime') {
        const data = await fetchData(`https://api.jikan.moe/v4/top/anime?page=${pageAnime}`);
        if(data) {
            appendItems(data.data, document.getElementById('animeGrid'), 'anime');
            pageAnime++;
        }
    } else {
        const data = await fetchData("https://api.tvmaze.com/shows");
        if(data) appendItems(data.slice(12, 36), document.getElementById('tvGrid'), 'tv');
    }
}

function appendItems(list, container, type) {
    list.forEach((item, index) => {
        const title = type === 'anime' ? item.title : item.name;
        const img = type === 'anime' ? item.images.jpg.large_image_url : (item.image?.original || item.image?.medium);
        const desc = type === 'anime' ? item.synopsis : item.summary;
        
        const card = document.createElement("div");
        card.className = "card animate-item";
        // Inline delay handled by intersection observer for better smoothness
        card.innerHTML = `<img src="${img}" loading="lazy"><div class="card-info"><h3>${title}</h3></div>`;
        card.onclick = () => openModal(title, img, desc);
        container.appendChild(card);
        
        if(!currentDataPool.find(x => x.title === title)) {
            currentDataPool.push({title, img, desc});
        }
    });
}

function updateHero(index) {
    const heroContent = document.getElementById('heroContent');
    const heroBg = document.getElementById('heroBg');
    const item = currentDataPool[index];
    
    if(!item) return;

    // Outgoing animation
    heroContent.style.opacity = '0';
    heroContent.style.transform = 'translateX(-30px)';
    heroBg.style.opacity = '0.3';
    
    setTimeout(() => {
        heroBg.style.backgroundImage = `url(${item.img})`;
        document.getElementById('heroTitle').innerText = item.title;
        document.getElementById('heroDesc').innerText = cleanHTML(item.desc).slice(0, 200) + "...";
        document.getElementById('heroBtn').onclick = () => openModal(item.title, item.img, item.desc);
        
        // Incoming animation
        heroBg.style.opacity = '1';
        heroContent.style.opacity = '1';
        heroContent.style.transform = 'translateX(0)';
        heroContent.classList.add('active');
    }, 800);
}

function openModal(title, image, description) {
    const modal = document.getElementById("modal");
    modal.style.display = "flex";
    
    // Forced reflow to trigger CSS transition
    modal.offsetHeight; 
    modal.classList.add('open');
    document.body.style.overflow = "hidden";
    
    document.getElementById('modalBanner').style.backgroundImage = `url(${image})`;
    document.getElementById('modalTitle').innerText = title;
    document.getElementById('modalDesc').innerText = cleanHTML(description);
    
    const isInWatchlist = watchlist.some(i => i.title === title);
    const btnGroup = document.getElementById('modalButtons');
    btnGroup.innerHTML = `
        <button class="primary" onclick="searchPlatform('${title}', 'netflix')">▶ Play on Netflix</button>
        <button class="secondary" onclick="searchPlatform('${title}', 'crunchyroll')">Crunchyroll</button>
        <button class="secondary" onclick="toggleWatchlist('${title}', '${image}', \`${description.replace(/`/g, "'")}\`)">
            ${isInWatchlist ? '✓ In Watchlist' : '+ Add to List'}
        </button>
    `;
}

function closeModal() {
    const modal = document.getElementById("modal");
    modal.classList.remove('open');
    setTimeout(() => {
        modal.style.display = "none";
        document.body.style.overflow = "auto";
    }, 400);
}

function toggleWatchlist(title, image, desc) {
    const idx = watchlist.findIndex(i => i.title === title);
    if(idx > -1) watchlist.splice(idx, 1);
    else watchlist.push({title, img: image, desc});
    
    localStorage.setItem('murphx_watchlist', JSON.stringify(watchlist));
    renderWatchlist();
    closeModal();
    // Smooth re-open with updated state
    setTimeout(() => openModal(title, image, desc), 500);
}

function renderWatchlist() {
    const grid = document.getElementById("watchlistGrid");
    const section = document.getElementById("watchlistSection");
    if (watchlist.length === 0) { section.style.display = "none"; return; }
    section.style.display = "block";
    grid.innerHTML = "";
    watchlist.forEach(item => {
        const card = document.createElement("div");
        card.className = "card animate-item";
        card.style.opacity = "1";
        card.innerHTML = `<img src="${item.img}"><div class="card-info"><h3>${item.title}</h3></div>`;
        card.onclick = () => openModal(item.title, item.img, item.desc);
        grid.appendChild(card);
    });
}

function searchPlatform(title, p) {
    const urls = {
        netflix: `https://www.netflix.com/search?q=${encodeURIComponent(title)}`,
        crunchyroll: `https://www.crunchyroll.com/search?q=${encodeURIComponent(title)}`
    };
    window.open(urls[p], "_blank");
}

function surpriseMe() {
    const item = currentDataPool[Math.floor(Math.random() * currentDataPool.length)];
    if(item) openModal(item.title, item.img, item.desc);
}

// Search Logic
document.getElementById('search').addEventListener("keypress", async (e) => {
    if (e.key === "Enter") {
        const q = e.target.value.trim();
        const a = await fetchData(`https://api.jikan.moe/v4/anime?q=${q}`);
        const animeGrid = document.getElementById('animeGrid');
        animeGrid.innerHTML = "";
        if(a) appendItems(a.data, animeGrid, 'anime');
        window.location.hash = "animeSection";
    }
});

// Auto Slider
let heroIdx = 0;
init().then(() => {
    setInterval(() => {
        heroIdx = (heroIdx + 1) % Math.min(currentDataPool.length, 12);
        updateHero(heroIdx);
    }, 10000); // 10s for more relaxed viewing
});

// Header scroll effect
window.addEventListener('scroll', () => {
    const nav = document.getElementById('mainNav');
    if(window.scrollY > 50) {
        nav.style.padding = "0.7rem 5%";
        nav.style.background = "rgba(5, 5, 5, 0.95)";
    } else {
        nav.style.padding = "1.2rem 5%";
        nav.style.background = "var(--glass)";
    }
});
</script>
</body>
</html>
