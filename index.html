<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Murphx | Discovery Hub</title>

<style>

:root {
--primary: #e50914;
--bg: #050505;
--card-bg: rgba(255, 255, 255, 0.05);
--glass: rgba(15, 15, 15, 0.75);
--text: #ffffff;
}

html { scroll-behavior: smooth; }

body {
margin:0;
font-family:'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
background:var(--bg);
color:var(--text);
line-height:1.6;
overflow-x:hidden;
}

/* header */

header{
background:var(--glass);
padding:0.8rem 5%;
display:flex;
justify-content:space-between;
align-items:center;
position:fixed;
top:0;
width:100%;
left:0;
z-index:1000;
backdrop-filter:blur(20px);
-webkit-backdrop-filter:blur(20px);
border-bottom:1px solid rgba(255,255,255,0.1);
}

.nav-left{
display:flex;
flex-direction:column;
align-items:flex-start;
gap:10px;
}

header h1{
color:var(--primary);
margin:0;
font-size:1.8rem;
cursor:pointer;
}

nav{
display:flex;
gap:20px;
}

nav a{
color:#eee;
text-decoration:none;
font-size:0.95rem;
font-weight:500;
transition:0.3s;
}

nav a:hover{
color:var(--primary);
}

.search-container{
display:flex;
gap:15px;
align-items:center;
}

header input{
padding:10px 18px;
border-radius:30px;
border:1px solid rgba(255,255,255,0.2);
background:rgba(255,255,255,0.1);
color:white;
width:220px;
transition:0.3s;
}

header input:focus{
outline:none;
border-color:var(--primary);
width:280px;
}

/* hero */

.hero{
height:80vh;
width:100%;
position:relative;
display:flex;
align-items:center;
padding:0 5%;
background:linear-gradient(to right,#050505 20%,transparent 80%),url('https://images.unsplash.com/photo-1574375927938-d5a98e8ffe85?auto=format&fit=crop&w=1350&q=80');
background-size:cover;
background-position:center;
}

.hero-content{
max-width:600px;
background:rgba(255,255,255,0.1);
backdrop-filter:blur(15px);
padding:40px;
border-radius:20px;
border:1px solid rgba(255,255,255,0.1);
}

.load-more-container{
display:flex;
justify-content:center;
margin-top:25px;
}
    
.hero-content h2{
font-size:3rem;
margin:0;
line-height:1.1;
}

.hero-content p{
color:#ccc;
margin:20px 0;
font-size:1.1rem;
}

/* sections */

section{
padding:3rem 5%;
}

.section-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

h2{
font-size:1.6rem;
display:flex;
align-items:center;
gap:12px;
margin:0;
}

h2::before{
content:'';
width:4px;
height:28px;
background:var(--primary);
border-radius:2px;
}

.card{
will-change:transform;
}

.card:hover img{
transform:scale(1.1);
}

.card img{
transition:transform .4s ease;
}
    
.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
gap:25px;
}

/* cards */

.card{
background:var(--card-bg);
border-radius:12px;
overflow:hidden;
cursor:pointer;
transition:all .4s cubic-bezier(.175,.885,.32,1.275);
border:1px solid rgba(255,255,255,.05);
}

.card:hover{
transform:scale(1.05);
border-color:var(--primary);
box-shadow:0 15px 30px rgba(0,0,0,.6);
}

.card img{
width:100%;
aspect-ratio:2/3;
object-fit:cover;
}

.card h3{
padding:12px;
font-size:.9rem;
text-align:center;
margin:0;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
}

/* modal */

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.85);
display:none;
justify-content:center;
align-items:center;
z-index:2000;
padding:20px;
backdrop-filter:blur(8px);
}

.modal-box{
background:rgba(25,25,25,.85);
backdrop-filter:blur(25px);
max-width:800px;
width:100%;
max-height:90vh;
overflow-y:auto;
border-radius:20px;
border:1px solid rgba(255,255,255,.1);
}

.modal-body{
padding:40px;
}

.modal-box img{
width:100%;
height:400px;
object-fit:cover;
mask-image:linear-gradient(to bottom,black 80%,transparent);
}

.close{
position:absolute;
top:20px;
right:20px;
width:40px;
height:40px;
background:rgba(255,255,255,.1);
color:white;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
cursor:pointer;
z-index:10;
font-weight:bold;
transition:.3s;
}

.close:hover{
background:var(--primary);
}

/* buttons */

.btn-group{
display:flex;
flex-wrap:wrap;
gap:12px;
margin-top:25px;
}

button{
padding:12px 24px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
transition:.3s;
background:rgba(255,255,255,.1);
color:white;
border:1px solid rgba(255,255,255,.1);
}

button.primary{
background:var(--primary);
border:none;
}

button.see-more{
background:transparent;
border:1px solid var(--primary);
color:var(--primary);
padding:8px 20px;
border-radius:20px;
font-size:.8rem;
}

button.see-more:hover{
background:var(--primary);
color:white;
}

button:hover{
transform:translateY(-3px);
background:rgba(255,255,255,.2);
}

.loader{
text-align:center;
padding:50px;
color:#666;
font-style:italic;
grid-column:1/-1;
}

/* ========================= */
/* MOBILE RESPONSIVE FIX */
/* ========================= */

@media (max-width:768px){

header{
flex-direction:column;
align-items:flex-start;
width:100%;
padding:15px;
gap:12px;
}

.nav-left{
display:flex;
flex-direction:column;
align-items:flex-start;
gap:8px;
}

nav{
display:flex;
gap:12px;
flex-wrap:wrap;
}

.search-container{
width:100%;
justify-content:flex-start;
}

header input{
width:150px;
}

header input:focus{
width:180px;
}

.hero{
height:auto;
padding-top:120px;
padding-bottom:40px;
}

.hero-content{
padding:20px;
}

.hero-content h2{
font-size:1.8rem;
}

.hero-content p{
font-size:.9rem;
}

.grid{
grid-template-columns:repeat(auto-fill,minmax(130px,1fr));
gap:15px;
}

.modal-box img{
height:220px;
}

.modal-body{
padding:20px;
}

}

@media (max-width:480px){

header{
padding:10px 15px;
}

nav{
gap:12px;
font-size:0.85rem;
}

header input{
width:130px;
}

.hero-content h2{
font-size:1.6rem;
}

.hero-content p{
font-size:0.85rem;
}

img{
max-width:100%;
height:auto;
}

.grid{
grid-template-columns:repeat(2,1fr);
gap:12px;
}

.card h3{
font-size:0.8rem;
}

button{
padding:10px 14px;
font-size:0.85rem;
}

}


</style>
</head>

<body>

<header>
    <div class="nav-left">
        <h1 onclick="window.scrollTo(0,0)">Murphx</h1>
        <nav>
            <a href="#">Home</a>
            <a href="#animeSection">Anime</a>
            <a href="#tvSection">TV Shows</a>
        </nav>
    </div>
    <div class="search-container">
        <button onclick="surpriseMe()" style="background:transparent; border:none; font-size: 1.5rem; cursor:pointer">🎲</button>
        <input id="search" type="text" placeholder="Search for magic...">
    </div>
</header>

<div class="hero">
    <div class="hero-content">
        <span style="color:var(--primary); font-weight:bold; letter-spacing: 2px;">TRENDING NOW</span>
        <h2 id="heroTitle">Loading Title...</h2>
        <p id="heroDesc">Loading the best content for you today. Explore thousands of movies and anime at your fingertips.</p>
        <button class="primary" id="heroBtn">View Details</button>
    </div>
</div>

<section id="watchlistSection" style="display: none;">
    <div class="section-header"><h2>⭐ My Watchlist</h2></div>
    <div id="watchlistGrid" class="grid"></div>
</section>

<section id="animeSection">
    <div class="section-header">
        <h2> Top Anime</h2>
    </div>
    <div id="animeGrid" class="grid"><div class="loader">Summoning Anime...</div></div>
    <div class="load-more-container">
        <button class="see-more" onclick="loadMore('anime')">See More</button>
    </div>
</section>

<section id="tvSection">
    <div class="section-header">
        <h2>TV Shows</h2>
    </div>
    <div id="tvGrid" class="grid"><div class="loader">Fetching Shows...</div></div>
    <div class="load-more-container">
    <button class="see-more" onclick="loadMore('tv')">See More</button>
    </div>
</section>

<div id="modal" class="modal" onclick="if(event.target === this) closeModal()">
    <div class="modal-box">
        <span class="close" onclick="closeModal()">✕</span>
        <div id="modalContent"></div>
    </div>
</div>

<script>
let watchlist = JSON.parse(localStorage.getItem('showVerse_watchlist')) || [];
let currentDataPool = [];
let pageAnime = 1;

const modal = document.getElementById("modal");
const modalContent = document.getElementById("modalContent");
const searchInput = document.getElementById("search");

const cleanHTML = (str) => str ? str.replace(/<\/?[^>]+(>|$)/g, "") : "No description available.";

async function fetchData(url) {
    try { const res = await fetch(url); return await res.json(); } 
    catch (err) { return null; }
}

async function init() {
    renderWatchlist();
    await loadMore('anime');
    await loadMore('tv');
    
    // Setup Hero
    if(currentDataPool.length > 0) {
        const top = currentDataPool[0];
        document.getElementById('heroTitle').innerText = top.title;
        document.getElementById('heroDesc').innerText = cleanHTML(top.desc).slice(0, 150) + "...";
        document.getElementById('heroBtn').onclick = () => openModal(top.title, top.img, top.desc);
    }
}

async function loadMore(type) {
    if(type === 'anime') {
        const data = await fetchData(`https://api.jikan.moe/v4/top/anime?page=${pageAnime}`);
        if(data) {
            appendItems(data.data, document.getElementById('animeGrid'), 'anime');
            pageAnime++;
        }
    } else {
        const data = await fetchData("https://api.tvmaze.com/shows");
        if(data) appendItems(data.slice(12, 36), document.getElementById('tvGrid'), 'tv');
    }
}

function appendItems(list, container, type) {
    if(pageAnime === 1 || type === 'tv') container.querySelector('.loader')?.remove();
    list.forEach(item => {
        const title = type === 'anime' ? item.title : item.name;
        const img = type === 'anime' ? item.images.jpg.large_image_url : (item.image?.original || item.image?.medium);
        const desc = type === 'anime' ? item.synopsis : item.summary;
        
        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `<img src="${img}"><h3>${title}</h3>`;
        card.onclick = () => openModal(title, img, desc);
        container.appendChild(card);
        currentDataPool.push({title, img, desc});
    });
}

function openModal(title, image, description) {
    modal.style.display = "flex";
    document.body.style.overflow = "hidden";
    const isInWatchlist = watchlist.some(i => i.title === title);
    
    modalContent.innerHTML = `
        <img src="${image}">
        <div class="modal-body">
            <h2 style="border:none; margin-top:-60px; position:relative; font-size:2.5rem;">${title}</h2>
            <p style="color:#ccc; font-size:1.05rem; margin-top:20px;">${cleanHTML(description)}</p>
            <div class="btn-group">
                <button class="primary" onclick="searchPlatform('${title}', 'netflix')">▶ Play on Netflix</button>
                <button onclick="searchPlatform('${title}', 'hianime')">HiAnime</button>
                <button onclick="searchPlatform('${title}', 'animekai')">AnimeKai</button>
                <button onclick="toggleWatchlist('${title}', '${image}', \`${description}\`)">
                    ${isInWatchlist ? '✓ In Watchlist' : '+ Add to List'}
                </button>
                <button onclick="closeModal()">← Back</button>
                <div style="width:100%; height:1px; background:rgba(255,255,255,0.1); margin: 10px 0;"></div>
                <button onclick="searchPlatform('${title}', 'youtube')">YouTube</button>
                <button onclick="searchPlatform('${title}', 'crunchyroll')">Crunchyroll</button>
            </div>
        </div>
    `;
}

function toggleWatchlist(title, image, desc) {
    const idx = watchlist.findIndex(i => i.title === title);
    if(idx > -1) watchlist.splice(idx, 1);
    else watchlist.push({title, img: image, desc});
    localStorage.setItem('showVerse_watchlist', JSON.stringify(watchlist));
    renderWatchlist();
    openModal(title, image, desc);
}

function renderWatchlist() {
    const grid = document.getElementById("watchlistGrid");
    const section = document.getElementById("watchlistSection");
    if (watchlist.length === 0) { section.style.display = "none"; return; }
    section.style.display = "block";
    grid.innerHTML = "";
    watchlist.forEach(item => {
        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `<img src="${item.img}"><h3>${item.title}</h3>`;
        card.onclick = () => openModal(item.title, item.img, item.desc);
        grid.appendChild(card);
    });
}

function closeModal() { modal.style.display = "none"; document.body.style.overflow = "auto"; }

function searchPlatform(title, p) {
    const encodedTitle = encodeURIComponent(title);

    const urls = {
        netflix: `https://www.netflix.com/search?q=${encodedTitle}`,
        youtube: `https://www.youtube.com/results?search_query=${encodedTitle}+trailer`,
        crunchyroll: `https://www.crunchyroll.com/search?q=${encodedTitle}`,
        hianime: `https://hianime.ro/search/${encodedTitle}`,
        animekai: `https://anikai.to/browser?keyword=${encodedTitle}`
    };

    window.open(urls[p], "_blank");
}

function surpriseMe() {
    const item = currentDataPool[Math.floor(Math.random() * currentDataPool.length)];
    openModal(item.title, item.img, item.desc);
}

searchInput.addEventListener("keypress", async (e) => {
    if (e.key === "Enter") {
        const q = searchInput.value.trim();
        const [a, t] = await Promise.all([
            fetchData(`https://api.jikan.moe/v4/anime?q=${q}`),
            fetchData(`https://api.tvmaze.com/search/shows?q=${q}`)
        ]);
        document.getElementById('animeGrid').innerHTML = "";
        document.getElementById('tvGrid').innerHTML = "";
        if(a) appendItems(a.data, document.getElementById('animeGrid'), 'anime');
        if(t) appendItems(t.map(i => i.show), document.getElementById('tvGrid'), 'tv');
        window.location.hash = "animeSection";
    }
});

// HERO AUTO SLIDER
let heroIndex = 0;

function rotateHero(){
if(currentDataPool.length === 0) return;

heroIndex++;
if(heroIndex >= currentDataPool.length){
heroIndex = 0;
}

const item = currentDataPool[heroIndex];

document.getElementById('heroTitle').innerText = item.title;
document.getElementById('heroDesc').innerText =
cleanHTML(item.desc).slice(0,150) + "...";

document.getElementById('heroBtn').onclick =
() => openModal(item.title,item.img,item.desc);
}

    
init().then(()=>{
setInterval(rotateHero,6000);
});
</script>
</body>
</html>
