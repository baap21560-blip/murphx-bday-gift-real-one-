<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Murphx | Discovery Hub</title>
<style>
:root {
    --primary: #e50914;
    --primary-glow: rgba(229, 9, 20, 0.5);
    --bg: #050505;
    --card-bg: rgba(255, 255, 255, 0.05);
    --glass: rgba(15, 15, 15, 0.8);
    --text: #ffffff;
    --transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
}

/* HIGH-END ANIMATIONS */
@keyframes meshGradient {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

@keyframes slideUpFade {
    from { opacity: 0; transform: translateY(40px) scale(0.95); }
    to { opacity: 1; transform: translateY(0) scale(1); }
}

@keyframes heroSwap {
    0% { opacity: 0; filter: blur(10px); transform: translateX(20px); }
    100% { opacity: 1; filter: blur(0); transform: translateX(0); }
}

@keyframes spin {
    to { transform: rotate(360deg); }
}

@keyframes modalBounce {
    0% { transform: scale(0.8); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
}

/* BASE STYLES */
html { scroll-behavior: smooth; }


*{
    -webkit-tap-highlight-color: transparent;
}

body{
    user-select:none;
}

.modal-body p{
    user-select:text;
}

button, .card{
    touch-action: manipulation;
}

body {
    margin: 0;
    font-family: 'Inter', 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    background-image: 
        radial-gradient(circle at 10% 20%, rgba(229, 9, 20, 0.05) 0%, transparent 40%),
        radial-gradient(circle at 90% 80%, rgba(229, 9, 20, 0.05) 0%, transparent 40%);
    background-size: 200% 200%;
    animation: meshGradient 15s ease infinite;
    color: var(--text);
    overflow-x: hidden;
}

header{
transition:0.4s;
}

header.scrolled{
background:rgba(0,0,0,0.95);
backdrop-filter:blur(30px);
}
    
/* PROFESSIONAL HEADER */
header {
    background: var(--glass);
    padding: 0.8rem 5%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: fixed;
    top: 0;
    width: 100%;
    left: 0;
    z-index: 1000;
    backdrop-filter: blur(20px);
    border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    box-sizing: border-box;
}

header h1 {
    color: var(--primary);
    margin: 0;
    font-size: 1.8rem;
    cursor: pointer;
    letter-spacing: 3px;
    font-weight: 900;
    transition: var(--transition);
}

header h1:hover { transform: scale(1.05); text-shadow: 0 0 20px var(--primary-glow); }

nav { display: flex; gap: 25px; }
nav a {
    color: #aaa;
    text-decoration: none;
    font-size: 0.9rem;
    font-weight: 600;
    text-transform: uppercase;
    transition: 0.3s;
}
nav a:hover { color: #fff; letter-spacing: 1px; }

header input {
    padding: 10px 20px;
    border-radius: 50px;
    border: 1px solid rgba(255, 255, 255, 0.1);
    background: rgba(255, 255, 255, 0.05);
    color: white;
    width: 200px;
    transition: var(--transition);
}

header input:focus {
    width: 280px;
    outline: none;
    border-color: var(--primary);
    background: rgba(255, 255, 255, 0.1);
    box-shadow: 0 0 30px rgba(229, 9, 20, 0.2);
}

/* CINEMATIC HERO */
.hero {
    height: 85vh;
    width: 100%;
    position: relative;
    display: flex;
    align-items: center;
    padding: 0 5%;
    background-size: cover;
    background-position: center;
    transition: background 1.2s ease-in-out;
    box-sizing: border-box;
}

.hero::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(to right, #050505 10%, transparent 60%),
                linear-gradient(to top, #050505 5%, transparent 40%);
}

.hero-content {
    max-width: 650px;
    z-index: 2;
    animation: slideUpFade 1s forwards;
}

#heroTitle {
    font-size: 4rem;
    margin: 10px 0;
    font-weight: 900;
    line-height: 1;
    text-transform: uppercase;
}

#heroDesc {
    font-size: 1.1rem;
    color: #ccc;
    margin-bottom: 30px;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
}

/* SECTION & GRIDS */
section { padding: 4rem 5%; }

h2 {
    font-size: 2rem;
    margin-bottom: 30px;
    display: flex;
    align-items: center;
    gap: 15px;
}

h2::after {
    content: '';
    height: 2px;
    flex-grow: 1;
    background: linear-gradient(to right, var(--primary), transparent);
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 30px;
}

.card {
    background: #111;
    border-radius: 12px;
    overflow: hidden;
    cursor: pointer;
    transition: var(--transition);
    border: 1px solid rgba(255,255,255,0.05);
    animation: slideUpFade 0.8s ease backwards;
}

.card img {
    width: 100%;
    aspect-ratio: 2/3;
    object-fit: cover;
    transition: transform 0.8s ease;
}

.card h3{
    padding:15px;
    font-size:1rem;
    text-align:center;
    margin:0;
    background:linear-gradient(transparent, rgba(0,0,0,0.9));
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
}

.card:hover {
    transform: translateY(-15px) scale(1.03);
    border-color: var(--primary);
    box-shadow: 0 20px 40px rgba(229, 9, 20, 0.2);
}

.card:hover img { transform: scale(1.1); }

/* PROFESSIONAL MODAL */
.modal {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.95);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 2000;
    backdrop-filter: blur(15px);
}

.modal-box {
    background: #0f0f0f;
    max-width: 900px;
    width: 95%;
    max-height: 90vh;
    border-radius: 24px;
    overflow-y: auto;
    border: 1px solid rgba(255,255,255,0.1);
    animation: modalBounce 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    position: relative;
}

.modal-box img {
    width: 100%;
    height: 450px;
    object-fit: cover;
    mask-image: linear-gradient(to bottom, black 70%, transparent);
}

.modal-body { padding: 40px; }

.btn-group {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
}

button {
    padding: 14px 28px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.05);
    color: white;
    font-weight: 700;
    cursor: pointer;
    transition: var(--transition);
}

button.primary { background: var(--primary); border: none; }

button:hover {
    background: #fff;
    color: #000;
    transform: translateY(-3px);
}

button.primary:hover {
    background: #ff0f1b;
    box-shadow: 0 0 30px var(--primary-glow);
    color: #fff;
}

/* CUSTOM LOADER */
.loader {
    grid-column: 1/-1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    padding: 100px 0;
}

.loader::after {
    content: '';
    width: 50px;
    height: 50px;
    border: 4px solid rgba(229, 9, 20, 0.2);
    border-top: 4px solid var(--primary);
    border-radius: 50%;
    animation: spin 1s linear infinite;
}

/* MOBILE OPTIMIZATION */
@media (max-width: 768px) {

header{
    flex-direction: column;
    align-items: stretch;
    gap: 10px;
    padding: 12px 4%;
}

/* first row */
.nav-left{
    display:flex;
    justify-content:space-between;
    align-items:center;
    width:100%;
}

nav{ display:none; }

/* search row */
.search-container{
    display:flex;
    width:100%;
    gap:10px;
}

header input{
    width:100%;
    flex:1;
    padding:12px 18px;
}

header input:focus{
    width:100%;
}

/* random button */
.search-container button{
    font-size:1.3rem;
    padding:8px;
}

/* hero spacing */
.hero{
height:65vh;
padding-top:160px;
}

#heroTitle{
    font-size:2.2rem;
}

#heroDesc{
    font-size:0.9rem;
}

/* grid */
.grid{
    grid-template-columns:repeat(2,1fr);
    gap:15px;
}

.modal-box img{
    height:250px;
}

.modal-body{
    padding:20px;
}

.btn-group button{
    width:100%;
}

}

/* STAGGERED GRID ANIMATION (JIKAN DELAY) */
.card:nth-child(1) { animation-delay: 0.1s; }
.card:nth-child(2) { animation-delay: 0.2s; }
.card:nth-child(3) { animation-delay: 0.3s; }
.card:nth-child(4) { animation-delay: 0.4s; }
</style>
</head>

<body>

<header>
    <div class="nav-left">
        <h1 onclick="window.scrollTo(0,0)">MURPHX</h1>
        <nav>
            <a href="#">Home</a>
            <a href="#animeSection">Anime</a>
            <a href="#tvSection">TV Shows</a>
        </nav>
    </div>
    <div class="search-container">
        <button onclick="surpriseMe()" style="background:transparent; border:none; font-size: 1.5rem; cursor:pointer">🎲</button>
        <input id="search" type="text" placeholder="Search...">
    </div>
</header>

<div class="hero" id="heroBg">
    <div class="hero-content">
        <span style="color:var(--primary); font-weight:900; letter-spacing: 4px; font-size: 0.8rem;">TRENDING NOW</span>
        <h2 id="heroTitle">Loading Title...</h2>
        <p id="heroDesc">Loading the best content for you today. Explore thousands of movies and anime at your fingertips.</p>
        <button class="primary" id="heroBtn">View Details</button>
    </div>
</div>

<section id="watchlistSection" style="display: none;">
    <div class="section-header"><h2>⭐ My Watchlist</h2></div>
    <div id="watchlistGrid" class="grid"></div>
</section>

<section id="animeSection">
    <div class="section-header">
        <h2>Top Anime</h2>
    </div>
    <div id="animeGrid" class="grid"><div class="loader">Summoning Anime...</div></div>
    <div class="load-more-container" style="text-align: center; margin-top: 40px;">
        <button onclick="loadMore('anime')">Load More Anime</button>
    </div>
</section>

<section id="tvSection">
    <div class="section-header">
        <h2>TV Shows</h2>
    </div>
    <div id="tvGrid" class="grid"><div class="loader">Fetching Shows...</div></div>
    <div class="load-more-container" style="text-align: center; margin-top: 40px;">
        <button onclick="loadMore('tv')">Load More TV</button>
    </div>
</section>

<div id="modal" class="modal" onclick="if(event.target === this) closeModal()">
    <div class="modal-box">
        <span class="close" onclick="closeModal()" style="position:absolute; top:20px; right:20px; cursor:pointer; font-size:1.5rem; z-index:100; background:rgba(0,0,0,0.5); width:40px; height:40px; border-radius:50%; display:flex; align-items:center; justify-content:center;">✕</span>
        <div id="modalContent"></div>
    </div>
</div>

<script>
let watchlist = JSON.parse(localStorage.getItem('showVerse_watchlist')) || [];
let currentDataPool = [];
let pageAnime = 1;

const modal = document.getElementById("modal");
const modalContent = document.getElementById("modalContent");
const searchInput = document.getElementById("search");

const cleanHTML = (str) => str ? str.replace(/<\/?[^>]+(>|$)/g, "") : "No description available.";

async function fetchData(url) {
    try { const res = await fetch(url); return await res.json(); } 
    catch (err) { return null; }
}

async function init() {
    renderWatchlist();
    await loadMore('anime');
    await loadMore('tv');
    
    // Setup Hero
    if(currentDataPool.length > 0) {
        updateHero(currentDataPool[0]);
    }
}

function updateHero(item) {
    const heroTitle = document.getElementById('heroTitle');
    const heroDesc = document.getElementById('heroDesc');
    const heroBg = document.getElementById('heroBg');

    // Add CSS animation for swap
    heroTitle.style.animation = 'none';
    heroDesc.style.animation = 'none';
    void heroTitle.offsetWidth; // Trigger reflow
    heroTitle.style.animation = 'heroSwap 0.8s forwards';
    heroDesc.style.animation = 'heroSwap 0.8s 0.1s forwards';

    heroBg.style.backgroundImage = `linear-gradient(to right, #050505 10%, transparent 60%), url('${item.img}')`;
    heroTitle.innerText = item.title;
    heroDesc.innerText = cleanHTML(item.desc).slice(0, 150) + "...";
    document.getElementById('heroBtn').onclick = () => openModal(item.title, item.img, item.desc);
}

async function loadMore(type) {
    if(type === 'anime') {
        const data = await fetchData(`https://api.jikan.moe/v4/top/anime?page=${pageAnime}`);
        if(data) {
            appendItems(data.data, document.getElementById('animeGrid'), 'anime');
            pageAnime++;
        }
    } else {
        const data = await fetchData("https://api.tvmaze.com/shows");
        if(data) appendItems(data.slice(12, 36), document.getElementById('tvGrid'), 'tv');
    }
}

function appendItems(list, container, type) {
    if(pageAnime === 1 || type === 'tv') container.querySelector('.loader')?.remove();
    list.forEach(item => {
        const title = type === 'anime' ? item.title : item.name;
        const img = type === 'anime' ? item.images.jpg.large_image_url : (item.image?.original || item.image?.medium);
        const desc = type === 'anime' ? item.synopsis : item.summary;
        
        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `<img src="${img}"><h3>${title}</h3>`;
        card.onclick = () => openModal(title, img, desc);
        container.appendChild(card);
        currentDataPool.push({title, img, desc});
    });
}

function openModal(title, image, description) {
    modal.style.display = "flex";
    document.body.style.overflow = "hidden";
    const isInWatchlist = watchlist.some(i => i.title === title);
    
    modalContent.innerHTML = `
        <img src="${image}">
        <div class="modal-body">
            <h2 style="border:none; margin-top:-60px; position:relative; font-size:2.5rem;">${title}</h2>
            <p style="color:#ccc; font-size:1.05rem; margin-top:20px; margin-bottom:30px;">${cleanHTML(description)}</p>
            <div class="btn-group">
                <button class="primary" onclick="searchPlatform('${title}', 'netflix')">▶ Play on Netflix</button>
                <button onclick="searchPlatform('${title}', 'hianime')">HiAnime</button>
                <button onclick="searchPlatform('${title}', 'animekai')">AnimeKai</button>
                <button onclick="toggleWatchlist('${title}', '${image}', \`${description.replace(/`/g, "'")}\`)">
                    ${isInWatchlist ? '✓ In Watchlist' : '+ Add to List'}
                </button>
                <button onclick="closeModal()">← Back</button>
                <div style="width:100%; height:1px; background:rgba(255,255,255,0.1); margin: 10px 0;"></div>
                <button onclick="searchPlatform('${title}', 'youtube')">YouTube</button>
                <button onclick="searchPlatform('${title}', 'crunchyroll')">Crunchyroll</button>
                <button onclick="searchPlatform('${title}', 'cinehd')">CineHD</button>

            </div>
        </div>
    `;
}

function toggleWatchlist(title, image, desc) {
    const idx = watchlist.findIndex(i => i.title === title);
    if(idx > -1) watchlist.splice(idx, 1);
    else watchlist.push({title, img: image, desc});
    localStorage.setItem('showVerse_watchlist', JSON.stringify(watchlist));
    renderWatchlist();
    openModal(title, image, desc);
}

function renderWatchlist() {
    const grid = document.getElementById("watchlistGrid");
    const section = document.getElementById("watchlistSection");
    if (watchlist.length === 0) { section.style.display = "none"; return; }
    section.style.display = "block";
    grid.innerHTML = "";
    watchlist.forEach(item => {
        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `<img src="${item.img}"><h3>${item.title}</h3>`;
        card.onclick = () => openModal(item.title, item.img, item.desc);
        grid.appendChild(card);
    });
}

function closeModal() { modal.style.display = "none"; document.body.style.overflow = "auto"; }

function searchPlatform(title, p) {
    const encodedTitle = encodeURIComponent(title);
    const urls = {
        netflix: `https://www.netflix.com/search?q=${encodedTitle}`,
        youtube: `https://www.youtube.com/results?search_query=${encodedTitle}+trailer`,
        crunchyroll: `https://www.crunchyroll.com/search?q=${encodedTitle}`,
        hianime: `https://hianime.ro/search/${encodedTitle}`,
        animekai: `https://anikai.to/browser?keyword=${encodedTitle}`
        cinehd: `https://cinehd.cc/search?page=1&q={encodedTitle}`
    };
    window.open(urls[p], "_blank");
}

function surpriseMe() {
    const item = currentDataPool[Math.floor(Math.random() * currentDataPool.length)];
    openModal(item.title, item.img, item.desc);
}

window.addEventListener("scroll",()=>{
if(window.scrollY>50){
document.querySelector("header").classList.add("scrolled")
}else{
document.querySelector("header").classList.remove("scrolled")
}
})
    
searchInput.addEventListener("keypress", async (e) => {
    if (e.key === "Enter") {
        const q = searchInput.value.trim();
        const [a, t] = await Promise.all([
            fetchData(`https://api.jikan.moe/v4/anime?q=${q}`),
            fetchData(`https://api.tvmaze.com/search/shows?q=${q}`)
        ]);
        document.getElementById('animeGrid').innerHTML = "";
        document.getElementById('tvGrid').innerHTML = "";
        if(a) appendItems(a.data, document.getElementById('animeGrid'), 'anime');
        if(t) appendItems(t.map(i => i.show), document.getElementById('tvGrid'), 'tv');
        window.location.hash = "animeSection";
    }
});

let heroIndex = 0;
function rotateHero(){
    if(currentDataPool.length === 0) return;
    heroIndex++;
    if(heroIndex >= currentDataPool.length) heroIndex = 0;
    updateHero(currentDataPool[heroIndex]);
}

init().then(()=>{
    setInterval(rotateHero, 8000);
});
</script>
</body>
</html>
