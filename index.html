<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Murphx | Discovery Hub</title>

<style>
:root {
    --primary: #e50914;
    --bg: #050505;
    --card-bg: rgba(255, 255, 255, 0.05);
    --glass: rgba(15, 15, 15, 0.75);
    --text: #ffffff;
    --transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
}

/* GLOBAL ANIMATIONS */
@keyframes fadeInUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
}

@keyframes pulse {
    0% { opacity: 0.5; }
    50% { opacity: 1; }
    100% { opacity: 0.5; }
}

@keyframes modalIn {
    from { opacity: 0; transform: scale(0.9) translateY(20px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
}

html {
    scroll-behavior: smooth;
}

body {
    margin: 0;
    font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
}

/* HEADER ENHANCEMENTS */
header {
    background: rgba(5, 5, 5, 0.8);
    padding: 0.8rem 5%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: fixed;
    top: 0;
    width: 100%;
    left: 0;
    z-index: 1000;
    backdrop-filter: blur(25px);
    border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    transition: var(--transition);
}

header h1 {
    color: var(--primary);
    margin: 0;
    font-size: 1.9rem;
    cursor: pointer;
    letter-spacing: 3px;
    font-weight: 900;
    text-shadow: 0 0 15px rgba(229, 9, 20, 0.3);
}

nav {
    display: flex;
    gap: 20px;
}

nav a {
    color: #bbb;
    text-decoration: none;
    font-size: .95rem;
    font-weight: 500;
    transition: var(--transition);
    position: relative;
}

nav a::after {
    content: '';
    position: absolute;
    bottom: -5px;
    left: 0;
    width: 0;
    height: 2px;
    background: var(--primary);
    transition: var(--transition);
}

nav a:hover {
    color: #fff;
}

nav a:hover::after {
    width: 100%;
}

/* SEARCH & BUTTONS */
header input {
    padding: 10px 18px;
    border-radius: 30px;
    border: 1px solid rgba(255, 255, 255, 0.15);
    background: rgba(255, 255, 255, 0.05);
    color: white;
    width: 220px;
    transition: var(--transition);
}

header input:focus {
    outline: none;
    border-color: var(--primary);
    width: 280px;
    background: rgba(255, 255, 255, 0.1);
    box-shadow: 0 0 20px rgba(229, 9, 20, 0.2);
}

/* HERO ENHANCEMENTS */
.hero {
    height: 85vh;
    width: 100%;
    position: relative;
    display: flex;
    align-items: center;
    padding: 0 5%;
    background: linear-gradient(to right, #050505 30%, transparent 90%), 
                url('https://images.unsplash.com/photo-1574375927938-d5a98e8ffe85?auto=format&fit=crop&w=1350&q=80');
    background-size: cover;
    background-position: center;
    animation: fadeInUp 1s ease-out;
}

.hero-content {
    max-width: 600px;
    background: rgba(0, 0, 0, 0.4);
    backdrop-filter: blur(20px);
    padding: 45px;
    border-radius: 24px;
    border: 1px solid rgba(255, 255, 255, 0.1);
    box-shadow: 0 25px 50px rgba(0,0,0,0.5);
    transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
}

.hero-content h2 {
    font-size: 3.5rem;
    margin: 10px 0;
    line-height: 1.1;
    font-weight: 800;
}

/* SECTION HEADERS */
section {
    padding: 4rem 5%;
    animation: fadeInUp 1.2s ease-out;
}

h2 {
    font-size: 1.8rem;
    display: flex;
    align-items: center;
    gap: 15px;
    margin: 0;
}

h2::before {
    content: '';
    width: 5px;
    height: 30px;
    background: var(--primary);
    border-radius: 10px;
    box-shadow: 0 0 10px var(--primary);
}

/* GRID & CARDS ENHANCEMENTS */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 30px;
}

.card {
    background: #111;
    border-radius: 16px;
    overflow: hidden;
    cursor: pointer;
    transition: var(--transition);
    border: 1px solid rgba(255, 255, 255, .05);
    position: relative;
}

.card img {
    width: 100%;
    aspect-ratio: 2/3;
    object-fit: cover;
    transition: transform 0.7s ease;
}

.card:hover {
    transform: translateY(-12px) scale(1.02);
    border-color: var(--primary);
    box-shadow: 0 15px 35px rgba(229, 9, 20, 0.25);
}

.card:hover img {
    transform: scale(1.1);
}

.card h3 {
    padding: 15px;
    font-size: .95rem;
    text-align: center;
    background: linear-gradient(transparent, rgba(0,0,0,0.9));
    position: absolute;
    bottom: 0;
    width: 100%;
    box-sizing: border-box;
}

/* MODAL ENHANCEMENTS */
.modal {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.92);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 2000;
    padding: 20px;
    backdrop-filter: blur(15px);
}

.modal-box {
    background: #0f0f0f;
    max-width: 850px;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    border-radius: 28px;
    border: 1px solid rgba(255, 255, 255, .1);
    animation: modalIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    position: relative;
}

.modal-box::-webkit-scrollbar {
    width: 6px;
}
.modal-box::-webkit-scrollbar-thumb {
    background: var(--primary);
    border-radius: 10px;
}

.modal-box img {
    width: 100%;
    height: 450px;
    object-fit: cover;
    mask-image: linear-gradient(to bottom, black 70%, transparent);
}

/* BUTTON ENHANCEMENTS */
button {
    padding: 12px 24px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    font-weight: bold;
    transition: var(--transition);
    background: rgba(255, 255, 255, 0.1);
    color: white;
    border: 1px solid rgba(255, 255, 255, 0.1);
}

button:hover {
    transform: translateY(-3px);
    background: rgba(255, 255, 255, 0.2);
    box-shadow: 0 10px 20px rgba(0,0,0,0.3);
}

button.primary {
    background: var(--primary);
    box-shadow: 0 4px 15px rgba(229, 9, 20, 0.3);
}

button.primary:hover {
    background: #ff0f1b;
    box-shadow: 0 8px 25px rgba(229, 9, 20, 0.5);
}

/* LOADER PULSE */
.loader {
    text-align: center;
    padding: 50px;
    color: #aaa;
    font-style: italic;
    grid-column: 1/-1;
    animation: pulse 1.5s infinite;
}

/* MOBILE OPTIMIZATIONS */
@media (max-width: 768px) {
    .hero { height: auto; padding-top: 140px; padding-bottom: 60px; }
    .hero-content h2 { font-size: 2.2rem; }
    .grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }
}
</style>
</head>

<body>

<header>
    <div class="nav-left">
        <h1 onclick="window.scrollTo(0,0)">MURPHX</h1>
        <nav>
            <a href="#">Home</a>
            <a href="#animeSection">Anime</a>
            <a href="#tvSection">TV Shows</a>
        </nav>
    </div>
    <div class="search-container">
        <button onclick="surpriseMe()" style="background:transparent; border:none; font-size: 1.5rem; cursor:pointer">🎲</button>
        <input id="search" type="text" placeholder="Search...">
    </div>
</header>

<div class="hero">
    <div class="hero-content">
        <span style="color:var(--primary); font-weight:bold; letter-spacing: 2px;">TRENDING NOW</span>
        <h2 id="heroTitle">Loading Title...</h2>
        <p id="heroDesc">Loading the best content for you today. Explore thousands of movies and anime at your fingertips.</p>
        <button class="primary" id="heroBtn">View Details</button>
    </div>
</div>

<section id="watchlistSection" style="display: none;">
    <div class="section-header"><h2>⭐ My Watchlist</h2></div>
    <div id="watchlistGrid" class="grid"></div>
</section>

<section id="animeSection">
    <div class="section-header">
        <h2> Top Anime</h2>
    </div>
    <div id="animeGrid" class="grid"><div class="loader">Summoning Anime...</div></div>
    <div class="load-more-container">
        <button class="see-more" onclick="loadMore('anime')">See More</button>
    </div>
</section>

<section id="tvSection">
    <div class="section-header">
        <h2>TV Shows</h2>
    </div>
    <div id="tvGrid" class="grid"><div class="loader">Fetching Shows...</div></div>
    <div class="load-more-container">
    <button class="see-more" onclick="loadMore('tv')">See More</button>
    </div>
</section>

<div id="modal" class="modal" onclick="if(event.target === this) closeModal()">
    <div class="modal-box">
        <span class="close" onclick="closeModal()">✕</span>
        <div id="modalContent"></div>
    </div>
</div>

<script>
let watchlist = JSON.parse(localStorage.getItem('showVerse_watchlist')) || [];
let currentDataPool = [];
let pageAnime = 1;

const modal = document.getElementById("modal");
const modalContent = document.getElementById("modalContent");
const searchInput = document.getElementById("search");

const cleanHTML = (str) => str ? str.replace(/<\/?[^>]+(>|$)/g, "") : "No description available.";

async function fetchData(url) {
    try { const res = await fetch(url); return await res.json(); } 
    catch (err) { return null; }
}

async function init() {
    renderWatchlist();
    await loadMore('anime');
    await loadMore('tv');
    
    // Setup Hero
    if(currentDataPool.length > 0) {
        const top = currentDataPool[0];
        document.getElementById('heroTitle').innerText = top.title;
        document.getElementById('heroDesc').innerText = cleanHTML(top.desc).slice(0, 150) + "...";
        document.getElementById('heroBtn').onclick = () => openModal(top.title, top.img, top.desc);
    }
}

async function loadMore(type) {
    if(type === 'anime') {
        const data = await fetchData(`https://api.jikan.moe/v4/top/anime?page=${pageAnime}`);
        if(data) {
            appendItems(data.data, document.getElementById('animeGrid'), 'anime');
            pageAnime++;
        }
    } else {
        const data = await fetchData("https://api.tvmaze.com/shows");
        if(data) appendItems(data.slice(12, 36), document.getElementById('tvGrid'), 'tv');
    }
}

function appendItems(list, container, type) {
    if(pageAnime === 1 || type === 'tv') container.querySelector('.loader')?.remove();
    list.forEach(item => {
        const title = type === 'anime' ? item.title : item.name;
        const img = type === 'anime' ? item.images.jpg.large_image_url : (item.image?.original || item.image?.medium);
        const desc = type === 'anime' ? item.synopsis : item.summary;
        
        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `<img src="${img}"><h3>${title}</h3>`;
        card.onclick = () => openModal(title, img, desc);
        container.appendChild(card);
        currentDataPool.push({title, img, desc});
    });
}

function openModal(title, image, description) {
    modal.style.display = "flex";
    document.body.style.overflow = "hidden";
    const isInWatchlist = watchlist.some(i => i.title === title);
    
    modalContent.innerHTML = `
        <img src="${image}">
        <div class="modal-body">
            <h2 style="border:none; margin-top:-60px; position:relative; font-size:2.5rem;">${title}</h2>
            <p style="color:#ccc; font-size:1.05rem; margin-top:20px;">${cleanHTML(description)}</p>
            <div class="btn-group">
                <button class="primary" onclick="searchPlatform('${title}', 'netflix')">▶ Play on Netflix</button>
                <button onclick="searchPlatform('${title}', 'hianime')">HiAnime</button>
                <button onclick="searchPlatform('${title}', 'animekai')">AnimeKai</button>
                <button onclick="toggleWatchlist('${title}', '${image}', \`${description}\`)">
                    ${isInWatchlist ? '✓ In Watchlist' : '+ Add to List'}
                </button>
                <button onclick="closeModal()">← Back</button>
                <div style="width:100%; height:1px; background:rgba(255,255,255,0.1); margin: 10px 0;"></div>
                <button onclick="searchPlatform('${title}', 'youtube')">YouTube</button>
                <button onclick="searchPlatform('${title}', 'crunchyroll')">Crunchyroll</button>
            </div>
        </div>
    `;
}

function toggleWatchlist(title, image, desc) {
    const idx = watchlist.findIndex(i => i.title === title);
    if(idx > -1) watchlist.splice(idx, 1);
    else watchlist.push({title, img: image, desc});
    localStorage.setItem('showVerse_watchlist', JSON.stringify(watchlist));
    renderWatchlist();
    openModal(title, image, desc);
}

function renderWatchlist() {
    const grid = document.getElementById("watchlistGrid");
    const section = document.getElementById("watchlistSection");
    if (watchlist.length === 0) { section.style.display = "none"; return; }
    section.style.display = "block";
    grid.innerHTML = "";
    watchlist.forEach(item => {
        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `<img src="${item.img}"><h3>${item.title}</h3>`;
        card.onclick = () => openModal(item.title, item.img, item.desc);
        grid.appendChild(card);
    });
}

function closeModal() { modal.style.display = "none"; document.body.style.overflow = "auto"; }

function searchPlatform(title, p) {
    const encodedTitle = encodeURIComponent(title);

    const urls = {
        netflix: `https://www.netflix.com/search?q=${encodedTitle}`,
        youtube: `https://www.youtube.com/results?search_query=${encodedTitle}+trailer`,
        crunchyroll: `https://www.crunchyroll.com/search?q=${encodedTitle}`,
        hianime: `https://hianime.ro/search/${encodedTitle}`,
        animekai: `https://anikai.to/browser?keyword=${encodedTitle}`
    };

    window.open(urls[p], "_blank");
}

function surpriseMe() {
    const item = currentDataPool[Math.floor(Math.random() * currentDataPool.length)];
    openModal(item.title, item.img, item.desc);
}

searchInput.addEventListener("keypress", async (e) => {
    if (e.key === "Enter") {
        const q = searchInput.value.trim();
        const [a, t] = await Promise.all([
            fetchData(`https://api.jikan.moe/v4/anime?q=${q}`),
            fetchData(`https://api.tvmaze.com/search/shows?q=${q}`)
        ]);
        document.getElementById('animeGrid').innerHTML = "";
        document.getElementById('tvGrid').innerHTML = "";
        if(a) appendItems(a.data, document.getElementById('animeGrid'), 'anime');
        if(t) appendItems(t.map(i => i.show), document.getElementById('tvGrid'), 'tv');
        window.location.hash = "animeSection";
    }
});

// HERO AUTO SLIDER
let heroIndex = 0;

function rotateHero(){
if(currentDataPool.length === 0) return;

heroIndex++;
if(heroIndex >= currentDataPool.length){
heroIndex = 0;
}

const item = currentDataPool[heroIndex];

document.getElementById('heroTitle').innerText = item.title;
document.getElementById('heroDesc').innerText =
cleanHTML(item.desc).slice(0,150) + "...";

document.getElementById('heroBtn').onclick =
() => openModal(item.title,item.img,item.desc);
}

    
init().then(()=>{
setInterval(rotateHero,6000);
});
</script>
</body>
</html>
